<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Claret Jug</title>
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Claret Jug">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0A2240">
<style>
  :root{
    --navy:#0A2240; --navy-2:#143A63; --gold:#C9A227; --gold-lt:#E3C766;
    --cream:#F6F2E8; --card:#FFFFFF; --rule:#D9D2C2; --muted:#7C8899;
    --red:#C00000; --amber:#FF9900;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:Georgia,'Times New Roman',serif;background:var(--cream);color:var(--navy);-webkit-font-smoothing:antialiased}
  .wrap{max-width:1120px;margin:0 auto;padding:0 22px}

  .mast{
    background:var(--navy);color:#fff;border-bottom:3px solid var(--gold);
    background-image:radial-gradient(circle at 88% -30%, rgba(201,162,39,.20), transparent 55%),
                     linear-gradient(180deg,#0A2240 0%,#0D2A50 100%);
  }
  .mast .wrap{display:flex;align-items:flex-end;justify-content:space-between;gap:24px;flex-wrap:wrap;padding:28px 22px 24px}
  .brand{display:flex;align-items:center;gap:18px}
  .jug{height:78px;width:auto;flex:none;display:block;filter:drop-shadow(0 2px 6px rgba(0,0,0,.35))}
  h1{font-size:36px;font-weight:normal;letter-spacing:-.6px;line-height:1}
  h1 em{font-style:normal;color:inherit}
  .eyebrow{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);margin-bottom:7px}
  .venue{font-size:13px;color:#9FB2C7;margin-top:7px;letter-spacing:.05em}
  .meta{text-align:right;display:flex;gap:32px}
  .meta .k{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--gold)}
  .meta .v{font-size:20px;font-variant-numeric:tabular-nums;color:#fff;margin-top:3px}

  .wx{text-align:center;min-width:148px}
  .wx .k{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--gold)}
  .wx .wv{font-size:20px;color:#fff;margin-top:3px;font-variant-numeric:tabular-nums}
  .wx .ws{font-size:12px;color:#9FB2C7;margin-top:2px;letter-spacing:.03em}

  .tabbar{background:var(--navy-2)}
  .tabbar .wrap{display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .tabbar .wrap::-webkit-scrollbar{display:none}
  .tabbar button{
    font-family:inherit;font-size:12px;letter-spacing:.16em;text-transform:uppercase;
    background:none;border:none;border-bottom:3px solid transparent;flex:none;white-space:nowrap;
    padding:15px 26px 12px;cursor:pointer;color:#9FB2C7;
  }
  .tabbar button:hover{color:#fff}
  .tabbar button[aria-selected="true"]{color:#fff;border-bottom-color:var(--gold)}
  .tabbar button:focus-visible{outline:2px solid var(--gold);outline-offset:-3px}
  main{padding:30px 0 60px}

  .team{background:var(--card);border:1px solid var(--rule);margin-bottom:14px;box-shadow:0 1px 2px rgba(10,34,64,.05)}
  .team.lead{border-color:var(--gold);box-shadow:0 2px 10px rgba(201,162,39,.18)}
  .team-hd{display:flex;align-items:center;gap:16px;padding:16px 18px;border-left:5px solid var(--c);cursor:pointer}
  .team-hd:hover{background:#FCFBF7}
  .rank{font-size:15px;width:30px;flex:none;text-align:center;color:var(--muted);font-variant-numeric:tabular-nums}
  .team.lead .rank{color:var(--gold)}
  .who{flex:1;min-width:0}
  .who .nm{font-size:20px}
  .who .nm small{font-size:12px;color:var(--muted);margin-left:6px}
  .who .sub{font-size:12px;color:var(--muted);margin-top:3px;letter-spacing:.04em}
  .who .sub b{color:var(--navy);font-weight:normal}
  .pts{text-align:right;flex:none;padding-right:4px}
  .pts .n{font-size:28px;font-variant-numeric:tabular-nums;line-height:1}
  .pts .l{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.16em;margin-top:3px}
  .caret{color:var(--muted);font-size:11px;flex:none;transition:transform .18s}
  .team.open .caret{transform:rotate(180deg)}
  .roster{border-top:1px solid #EDE8DC;display:none;background:#FCFBF7}
  .team.open .roster{display:block}

  .g-row{display:grid;grid-template-columns:34px 1fr 58px 48px 52px 46px 60px;gap:11px;align-items:center;
         padding:8px 18px 8px 22px;border-bottom:1px solid #F1ECE0}
  .g-row:last-child{border-bottom:none}
  .shot{width:34px;height:34px;border-radius:50%;object-fit:cover;background:#E7E2D6;border:1px solid var(--rule)}
  .gn{font-size:16px;display:flex;align-items:center;gap:7px;min-width:0}
  .gn span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .flag{width:17px;height:12px;flex:none;object-fit:cover;border:1px solid rgba(0,0,0,.12)}
  .gp,.gt,.gs,.gh,.gx{text-align:right;font-variant-numeric:tabular-nums;font-size:14px}
  .gp,.gt{color:var(--muted)}
  .gt{font-size:12px}
  .gh{color:var(--muted);font-size:12px}
  .gx{font-size:16px}
  .cut{opacity:.55}
  .g-row.slot{color:#B4AC9B}
  .g-row.slot .shot{background:#EFEBE1;border-style:dashed}
  .g-row.slot .gn span{font-style:italic}
  .cut .gn span{text-decoration:line-through;text-decoration-color:var(--red)}
  .cut .gp{color:var(--red)}
  .under{color:var(--red)} .over{color:var(--navy)} .lvl{color:var(--muted)}
  .hd-lbl{display:grid;grid-template-columns:34px 1fr 58px 48px 52px 46px 60px;gap:11px;
          padding:7px 18px 7px 22px;border-bottom:1px solid #EDE8DC;background:#F7F3E9;
          font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
  .hd-lbl span:nth-child(n+3){text-align:right}

  table{width:100%;border-collapse:collapse;background:var(--card);border:1px solid var(--rule)}
  thead{background:var(--navy)}
  th{text-align:left;font-weight:normal;font-size:10px;letter-spacing:.16em;text-transform:uppercase;
     color:var(--gold);padding:12px;white-space:nowrap}
  td{padding:8px 12px;border-bottom:1px solid #F1ECE0;font-size:15px;vertical-align:middle}
  tbody tr:last-child td{border-bottom:none}
  .num{text-align:right;font-variant-numeric:tabular-nums}
  tr.owned{background:#FDFBF3;box-shadow:inset 3px 0 0 var(--gold)}
  tr.mine{background:#FBF6E4;box-shadow:inset 3px 0 0 var(--navy)}
  .pcell{display:flex;align-items:center;gap:9px}
  .pcell img.shot{width:28px;height:28px}
  .chip{display:inline-block;font-size:10px;letter-spacing:.09em;text-transform:uppercase;
        padding:3px 8px;border:1px solid var(--c);color:var(--c);margin-right:4px;white-space:nowrap}
  .chip.me{background:var(--c);color:#fff}
  .bar{display:block;height:6px;background:#EDE8DC;min-width:70px}
  .bar i{display:block;height:100%;background:var(--gold)}
  .bar.neg i{background:var(--red)}
  .toggle{font-family:inherit;font-size:12px;letter-spacing:.1em;text-transform:uppercase;background:var(--card);
          border:1px solid var(--rule);padding:9px 16px;cursor:pointer;color:var(--navy);margin-bottom:16px}
  .toggle:hover{border-color:var(--navy)}
  .cmp-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
  .cmp{min-width:900px}
  .board-tbl{min-width:356px;table-layout:fixed}
  .board-tbl .pcell{min-width:0;gap:6px}
  .bn{min-width:0;overflow-wrap:break-word;line-height:1.2;font-size:14px}
  .board-tbl th{white-space:normal}
  .board-tbl th,.board-tbl td{padding-left:6px;padding-right:6px}
  .board-tbl .chip{font-size:9px;padding:2px 5px;letter-spacing:.03em;margin-right:3px}
  .own{font-size:11px;color:var(--muted);letter-spacing:.05em}

  .tee{line-height:1.2}
  .tee b{font-weight:normal;display:block;font-size:12px}
  .tee span{display:block;font-size:10px;color:var(--muted)}

  #pins{margin:0 -22px}
  .pinsheet{width:100%;height:auto;display:block}
  .pins-miss{padding:44px 18px;margin:30px 22px 0;text-align:center;color:var(--muted);font-size:15px;background:var(--card);border:1px solid var(--rule)}

  .click{cursor:pointer}
  .g-row.click:hover{background:#F4EFE2}
  tr.click:hover td{background:#FBF7EC}
  .chev{color:var(--muted);font-size:10px;flex:none;margin-left:4px;transition:transform .18s}
  .g-row.exp .chev,tr.exp .chev{transform:rotate(180deg);color:var(--navy)}
  .g-row.exp{background:#F1EAD8}
  tr.exp>td{background:#F6EFDA}
  .g-detail{background:#FBF7EC;border-bottom:1px solid #EDE8DC}
  tr.detail-row>td{background:#FBF7EC;padding:0;border-bottom:1px solid #EDE8DC}
  .pdetail{padding:14px 16px 18px;max-width:640px}
  .rd-block{margin-bottom:18px}
  .rd-ttl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
  .rd-stats{font-size:12.5px;color:var(--muted);margin-bottom:10px;letter-spacing:.02em}
  .rd-stats b{font-weight:bold;color:var(--navy)}
  .rd-stats b.under{color:var(--red)}
  .sc .tp{font-size:11px;font-variant-numeric:tabular-nums;color:var(--muted)}
  .sc .tp.under,.sc .tot.under{color:var(--red)} .sc .tp.over,.sc .tot.over{color:var(--navy)}
  .sc-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
  .sc{border-collapse:collapse;font-variant-numeric:tabular-nums;width:100%;margin-bottom:11px}
  .sc td,.sc th{border:1px solid var(--rule);padding:4px 2px;text-align:center;font-size:12px;font-weight:normal;min-width:30px;height:32px}
  .sc thead th{background:var(--navy);color:var(--gold);font-size:9px}
  .sc .lab{background:#F7F3E9;color:var(--muted);font-size:9px;text-transform:uppercase;letter-spacing:.06em;text-align:left;padding-left:8px;white-space:nowrap;min-width:40px}
  .sc td.tot,.sc th.tot{background:#F7F3E9;font-weight:bold}
  .mk{display:inline-flex;align-items:center;justify-content:center;width:21px;height:21px;line-height:1}
  .mk.birdie{border:1.6px solid var(--red);border-radius:50%;color:var(--red)}
  .mk.eagle{border:1.6px solid var(--red);border-radius:50%;color:var(--red);box-shadow:0 0 0 2px var(--card),0 0 0 3.4px var(--red)}
  .mk.bogey{border:1.6px solid var(--navy)}
  .mk.dbl{border:1.6px solid var(--navy);box-shadow:0 0 0 2px var(--card),0 0 0 3.4px var(--navy)}
  .legend{display:flex;flex-wrap:wrap;gap:14px;justify-content:center;padding:2px 0 16px;color:var(--muted);font-size:11px}
  .legend span{display:inline-flex;align-items:center;gap:6px}
  .lg{width:15px;height:15px;flex:none}
  .lg.cir{border:1.6px solid var(--red);border-radius:50%}
  .lg.sq{border:1.6px solid var(--navy)}
  .sheet-tee{padding:14px 0 6px;text-align:center}
  .sheet-tee .big{font-size:24px}
  .sheet-tee .sm{font-size:13px;color:var(--muted);margin-top:5px}
  .sheet-note{padding:26px 10px;text-align:center;color:var(--muted);font-size:14px;line-height:1.5}

  .banner{border-left:4px solid var(--amber);background:#FFF9EF;padding:12px 16px;font-size:14px;margin-bottom:22px;line-height:1.55}
  .banner.err{border-left-color:var(--red);background:#FDF3F3}
  .hide{display:none}

  @media (max-width:680px){
    h1{font-size:26px} .jug{height:56px}
    .wx{text-align:left;min-width:0;flex-basis:100%;order:3;margin-top:4px}
    .meta{text-align:left;gap:22px}
    .g-row,.hd-lbl{grid-template-columns:28px 1fr 42px 46px 50px;gap:8px;padding-left:14px}
    .g-row .gt,.g-row .gh,.chev,.hd-lbl span:nth-child(4),.hd-lbl span:nth-child(6){display:none}
    #board .cmp-scroll{margin:0 -22px}
    .tabbar button{padding:13px 15px;letter-spacing:.08em}
  }
  @media (prefers-reduced-motion:no-preference){
    .team{animation:rise .32s ease both}
    @keyframes rise{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
  }
</style>
</head>

        </tr></thead>
        <tbody id="cmpBody"></tbody>
      </table>
    </div>
  </section>

  <section id="pins" class="hide">
    <img class="pinsheet" src="pins-day1.jpg" alt="Day 1 pin locations"
         onerror="this.style.display='none';document.getElementById('pinsMissing').classList.remove('hide')">
    <div id="pinsMissing" class="pins-miss hide">Day&nbsp;1 pin sheet posts here.</div>
  </section>
</main>

<script>
/* ================= CONFIG ================= */
const MOCK      = false;              // true = simulated Saturday. Set false Thursday for live scores.
const EVENT_ID  = '401811957';
const POT       = 36;
const REFRESH_MS= 60000;
const PALETTE   = ['#0A2240', '#C9A227', '#157A7A', '#B5651D'];

const ENTRANTS = [
  { name:'Eric', me:true, golfers:['Ludvig Aberg','Matt Fitzpatrick','Tyrrell Hatton','Russell Henley','Tom Kim','Aaron Rai'] },
  { name:'Jimmy',       golfers:['Matt Fitzpatrick','Tommy Fleetwood','Chris Gotterup','Sam Burns','Brian Harman','Kurt Kitayama'] },
  { name:'Garrett',     golfers:['Matt Fitzpatrick','Collin Morikawa','Viktor Hovland','Russell Henley','Wyndham Clark','Min Woo Lee'] },
  { name:'Dr. Swanson', golfers:['Matt Fitzpatrick','Rory McIlroy','Robert MacIntyre','Jordan Spieth','Brian Harman','Gary Woodland'] }
];

const PARS = [4,4,4,3,4,4,3,4,4,4,4,3,4,5,3,4,5,4];   // Royal Birkdale, par 70
const TOTAL_HOLES = 72;

/* ================= DK scoring ================= */
const DK={DBL_EAGLE:13,EAGLE:8,BIRDIE:3,PAR:.5,BOGEY:-.5,DBL:-1,WORSE:-1,ACE:10,STREAK:3,BOGEY_FREE:3,SUB70:5};
const PLACE={1:30,2:20,3:18,4:16,5:14,6:12,7:10,8:9,9:8,10:7};
function placePts(p){
  if(!p||p<1) return 0;
  if(PLACE[p]!==undefined) return PLACE[p];
  if(p<=15) return 6; if(p<=20) return 5; if(p<=25) return 4;
  if(p<=30) return 3; if(p<=40) return 2; if(p<=50) return 1;
  return 0;
}
function holePts(h){
  if(h.value===1) return DK.ACE;
  const d=h.value-h.par;
  if(d<=-3) return DK.DBL_EAGLE;
  if(d===-2) return DK.EAGLE;
  if(d===-1) return DK.BIRDIE;
  if(d===0)  return DK.PAR;
  if(d===1)  return DK.BOGEY;
  if(d===2)  return DK.DBL;
  return DK.WORSE;
}

const norm=s=>(s||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().replace(/[^a-z ]/g,'').trim();
const key=f=>{const p=norm(f).split(/\s+/);return p[0][0]+'|'+p[p.length-1];};

let FIELD={},ROSTER={},EVENT=null,ownedOnly=false;
const openTeams=new Set(), expanded=new Set();
ENTRANTS.forEach((e,i)=>{e.color=PALETTE[i%PALETTE.length];e.idx=i;});

/* ================= load ================= */
async function load(){
  try{
    const r=await fetch(`https://site.api.espn.com/apis/site/v2/sports/golf/leaderboard?league=pga&event=${EVENT_ID}`,{cache:'no-store'});
    if(!r.ok) throw new Error('leaderboard '+r.status);
    const d=await r.json();
    EVENT=d.events&&d.events[0];
    if(!EVENT) throw new Error('event '+EVENT_ID+' not found');

    FIELD={};
    EVENT.competitions[0].competitors.forEach(c=>{
      const s=c.status||{},a=c.athlete;
      FIELD[c.id]={
        id:c.id,name:a.displayName,k:key(a.displayName),
        shot:(a.headshot&&a.headshot.href)||'',
        flag:(a.flag&&a.flag.href)||'',country:(a.flag&&a.flag.alt)||'',
        pos:(s.position&&s.position.displayName)||'-',
        posNum:parseInt((s.position&&s.position.id)||0,10)||0,
        toPar:(c.statistics||[]).find(x=>x.name==='scoreToPar'),
        thru:s.thru,round:s.period,teeTime:s.teeTime,
        state:(s.type&&s.type.name)||'STATUS_SCHEDULED',
        dk:null,holes:null
      };
    });

    ROSTER={};
    const byKey={}; Object.values(FIELD).forEach(g=>byKey[g.k]=g.id);
    const miss=[];
    ENTRANTS.forEach(e=>{
      e.ids=e.golfers.map(n=>{
        const id=byKey[key(n)];
        if(!id){miss.push(n+' ('+e.name+')');return null;}
        (ROSTER[id]=ROSTER[id]||[]).push(e.idx);
        return id;
      });
    });

    if(MOCK){ simulate(); }
    else{
      const live=EVENT.status.type.state!=='pre';
      if(live) await loadHoles(Object.keys(ROSTER));
    }
    Object.keys(ROSTER).forEach(id=>score(FIELD[id]));

    banner(
      MOCK ? {m:'Demo mode. Simulated Saturday, Round 3 in progress.'}
      : miss.length ? {m:'Unmatched names, scoring zero: '+miss.join(', '),err:true}
      : null);
    render();
  }catch(e){
    banner({m:'Scores unavailable: '+e.message+'. Retrying in 60 seconds.',err:true});
  }
}

async function loadHoles(ids){
  await Promise.all(ids.map(async id=>{
    try{
      const u=`https://sports.core.api.espn.com/v2/sports/golf/leagues/pga/events/${EVENT_ID}/competitions/${EVENT_ID}/competitors/${id}/linescores`;
      const r=await fetch(u,{cache:'no-store'});
      if(!r.ok) return;
      const j=await r.json();
      FIELD[id].holes=(j.items||[]).map(rd=>({
        strokes:rd.value,
        holes:(rd.linescores||[]).filter(h=>h&&h.value).map(h=>({value:h.value,par:h.par}))
      }));
    }catch(e){}
  }));
}

/* ================= mock: simulated Saturday ================= */
function rng(seed){let t=seed>>>0;return()=>{t+=0x6D2B79F5;let x=Math.imul(t^t>>>15,1|t);x^=x+Math.imul(x^x>>>7,61|x);return((x^x>>>14)>>>0)/4294967296;};}
function playRound(rand, skill){
  const holes=[];
  PARS.forEach(par=>{
    const r=rand();
    let d;
    if(r < .015)             d=-2;                       // eagle
    else if(r < .015+skill)  d=-1;                       // birdie
    else if(r < .70)         d=0;
    else if(r < .93)         d=1;
    else if(r < .98)         d=2;
    else                     d=3;
    holes.push({value:par+d, par});
  });
  return {holes, strokes:holes.reduce((s,h)=>s+h.value,0)};
}
function simulate(){
  const ids=Object.keys(FIELD);
  const scores={};
  ids.forEach(id=>{
    const rand=rng(parseInt(id,10));
    const skill=.14+rand()*.20;                          // birdie rate 14-34%
    const r1=playRound(rand,skill), r2=playRound(rand,skill);
    scores[id]={rounds:[r1,r2],rand,skill,toPar:(r1.strokes-70)+(r2.strokes-70)};
  });
  // cut: top 70 and ties after 36 holes
  const sorted=ids.slice().sort((a,b)=>scores[a].toPar-scores[b].toPar);
  const line=scores[sorted[Math.min(69,sorted.length-1)]].toPar;

  sorted.forEach(id=>{
    const s=scores[id], g=FIELD[id];
    if(s.toPar>line){
      g.state='STATUS_CUT'; g.thru=18; g.round=2;
      g.holes=s.rounds; g.mockToPar=s.toPar;
      return;
    }
    const thru=6+Math.floor(s.rand()*13);                // R3 thru 6-18
    const r3=playRound(s.rand,s.skill);
    r3.holes=r3.holes.slice(0,thru);
    r3.strokes=r3.holes.reduce((x,h)=>x+h.value,0);
    const r3par=r3.holes.reduce((x,h)=>x+h.par,0);
    g.state='STATUS_IN_PROGRESS'; g.thru=thru; g.round=3;
    g.holes=[...s.rounds, r3];
    g.mockToPar=s.toPar+(r3.strokes-r3par);
  });

  // positions from live to-par among alive golfers
  const alive=ids.filter(id=>FIELD[id].state!=='STATUS_CUT')
                 .sort((a,b)=>FIELD[a].mockToPar-FIELD[b].mockToPar);
  let pos=0,prev=null;
  alive.forEach((id,i)=>{
    const g=FIELD[id];
    if(g.mockToPar!==prev){pos=i+1;prev=g.mockToPar;}
    const tie=alive.filter(x=>FIELD[x].mockToPar===g.mockToPar).length>1;
    g.posNum=pos;
    g.pos=(tie?'T':'')+pos;
  });
  ids.forEach(id=>{
    const g=FIELD[id];
    const v=g.mockToPar;
    g.toPar={value:v, displayValue: v===0?'E':(v>0?'+'+v:''+v)};
    if(g.state==='STATUS_CUT'){g.pos='-';g.posNum=0;}
  });
  EVENT.status={period:3, type:{state:'in', completed:false, name:'STATUS_IN_PROGRESS'}};
}

/* ================= scoring ================= */
function score(g){
  let p=0,b=0,e=0,bg=0,done=0,u70=0,played=0;
  (g.holes||[]).forEach(rd=>{
    let streak=0,clean=true,got=false;
    rd.holes.forEach(h=>{
      p+=holePts(h); played++;
      const d=h.value-h.par;
      if(d===-1) b++;
      if(d===-2) e++;
      if(d>=1){bg++;clean=false;}
      if(d<=-1){streak++; if(streak>=3&&!got){p+=DK.STREAK;got=true;}}
      else streak=0;
    });
    if(rd.holes.length===18){done++; if(clean)p+=DK.BOGEY_FREE; if(rd.strokes&&rd.strokes<70)u70++;}
  });
  if(done===4&&u70===4) p+=DK.SUB70;
  const cut=g.state==='STATUS_CUT'||g.state==='STATUS_WITHDRAWN';
  const pl=cut?0:placePts(g.posNum);
  g.dk={pts:p+pl,birdies:b,eagles:e,bogeys:bg,cut,played,left:cut?0:Math.max(0,TOTAL_HOLES-played)};
}

/* ================= render ================= */
const fmt=n=>(Math.round(n*10)/10).toFixed(1);
const parCls=v=>v<0?'under':(v>0?'over':'lvl');
function toPar(g){
  if(!g||g.state==='STATUS_SCHEDULED') return '--';
  const t=g.toPar;
  return (!t||t.displayValue==='-')?'E':t.displayValue;
}
function thru(g){
  if(!g) return '';
  if(g.state==='STATUS_CUT') return 'CUT';
  if(g.state==='STATUS_WITHDRAWN') return 'WD';
  if(g.state==='STATUS_SCHEDULED')
    return g.teeTime?new Date(g.teeTime).toLocaleTimeString([],{hour:'numeric',minute:'2-digit'}):'--';
  return (g.thru===18||g.thru===0)?'F':g.thru;
}
const img=g=>g.shot?`<img class="shot" src="${g.shot}" alt="" loading="lazy">`:`<span class="shot"></span>`;
const flag=g=>g.flag?`<img class="flag" src="${g.flag}" alt="${g.country}" loading="lazy">`:'';

/* tee-time helpers: sort by tee time until teed off, then by score; show UK + CT + ET */
const teeMs=g=>(g&&g.teeTime)?new Date(g.teeTime).getTime():Infinity;
const started=g=>g.state!=='STATUS_SCHEDULED';
function boardCmp(a,b){
  const aS=started(a), bS=started(b);
  if(aS!==bS) return aS?-1:1;                                   // teed-off above not-yet-started
  if(aS) return ((a.posNum||999)-(b.posNum||999))||(teeMs(a)-teeMs(b))||a.name.localeCompare(b.name);
  return (teeMs(a)-teeMs(b))||a.name.localeCompare(b.name);     // both waiting -> earliest tee first
}
const tzTime=(ms,tz)=>new Date(ms).toLocaleTimeString('en-US',{timeZone:tz,hour:'numeric',minute:'2-digit'}).replace(' AM','a').replace(' PM','p');
function boardThru(g){
  if(g.state==='STATUS_SCHEDULED' && g.teeTime){
    const ms=new Date(g.teeTime).getTime();
    return `<div class="tee"><b>${tzTime(ms,'Europe/London')} UK</b>`+
           `<span>${tzTime(ms,'America/Chicago')} CT</span><span>${tzTime(ms,'America/New_York')} ET</span></div>`;
  }
  return thru(g);
}

function render(){
  const st=EVENT.status.type;
  document.getElementById('rnd').textContent=st.state==='pre'?'Thu':(st.completed?'Final':(EVENT.status.period||1));
  document.getElementById('upd').textContent=new Date().toLocaleTimeString([],{hour:'numeric',minute:'2-digit'});
  document.getElementById('pot').textContent='$'+POT;

  const anyRoster = ENTRANTS.some(e=>e.golfers.length>0);
  const teams=ENTRANTS.map(e=>{
    const gs=Array.from({length:6},(_,i)=>{
      const id=e.ids[i];
      if(id===undefined) return {slot:true};
      if(id===null)      return {bad:true, nm:e.golfers[i]};
      return FIELD[id];
    });
    return {e,gs,set:e.golfers.length>0,
      total:gs.reduce((s,g)=>s+(g.dk?g.dk.pts:0),0),
      alive:gs.filter(g=>g.dk&&!g.dk.cut).length,
      left :gs.reduce((s,g)=>s+(g.dk?g.dk.left:0),0)};
  }).sort((a,b)=>b.total-a.total);

  document.getElementById('pool').innerHTML=teams.map((t,i)=>{
    const rows=t.gs.map((g,gi)=>{
      if(g.slot) return `<div class="g-row slot"><span class="shot"></span>
        <span class="gn"><span>Pick ${gi+1}</span></span>
        <span class="gp">&mdash;</span><span class="gt"></span><span class="gs">&mdash;</span>
        <span class="gh">&mdash;</span><span class="gx">&mdash;</span></div>`;
      if(g.bad) return `<div class="g-row"><span class="shot"></span>
        <span class="gn" style="color:var(--red)"><span>${g.nm} &mdash; no match</span></span>
        <span class="gp">--</span><span class="gt"></span><span class="gs">--</span>
        <span class="gh">0</span><span class="gx">0.0</span></div>`;
      const d=g.dk||{}; const c=d.cut;
      const pk='p:'+t.e.idx+':'+gi, pOpen=expanded.has(pk);
      return `<div class="g-row click ${c?'cut':''} ${pOpen?'exp':''}" onclick="event.stopPropagation();togglePool(${t.e.idx},${gi},'${g.id}')">
        ${img(g)}
        <span class="gn">${flag(g)}<span>${g.name}</span><span class="chev">&#9662;</span></span>
        <span class="gp">${c?'CUT':g.pos}</span>
        <span class="gt">${thru(g)}</span>
        <span class="gs ${parCls((g.toPar&&g.toPar.value)||0)}">${toPar(g)}</span>
        <span class="gh">${c?'&mdash;':d.left}</span>
        <span class="gx">${d.pts!==undefined?fmt(d.pts):'0.0'}</span>
      </div>${pOpen?('<div class="g-detail">'+scoreDetail(g)+'</div>'):''}`;
    }).join('');
    const cls = (anyRoster ? (i===0?'lead':'') : '') + (openTeams.has(t.e.idx)?' open':'');
    const sub = t.set
      ? `${t.alive} of 6 alive &middot; <b>${t.left}</b> holes left${(i===0&&anyRoster)?' &middot; leading':''}`
      : 'Roster locks Thursday';
    return `<div class="team ${cls}" style="--c:${t.e.color}" onclick="toggleTeam(${t.e.idx})">
      <div class="team-hd">
        <span class="rank">${anyRoster?(i+1):'&ndash;'}</span>
        <span class="who">
          <div class="nm">${t.e.name}${t.e.me?'<small>you</small>':''}</div>
          <div class="sub">${sub}</div>
        </span>
        <span class="pts"><div class="n">${t.set?fmt(t.total):'&mdash;'}</div><div class="l">Points</div></span>
        <span class="caret">&#9662;</span>
      </div>
      <div class="roster">
        <div class="hd-lbl"><span></span><span>Golfer</span><span>Pos</span><span>Thru</span><span>Score</span><span>Left</span><span>Pts</span></div>
        ${rows}
      </div>
    </div>`;
  }).join('');

  const all=Object.values(FIELD).sort(boardCmp);
  document.getElementById('boardBody').innerHTML=all
    .filter(g=>!ownedOnly||ROSTER[g.id])
    .map(g=>{
      const own=ROSTER[g.id]||[];
      const mine=own.some(i=>ENTRANTS[i].me);
      const chips=own.map(i=>{const e=ENTRANTS[i];
        return `<span class="chip ${e.me?'me':''}" style="--c:${e.color}">${e.name}</span>`;}).join('');
      const bOpen=expanded.has('b:'+g.id);
      return `<tr class="click ${mine?'mine':(own.length?'owned':'')} ${bOpen?'exp':''}" onclick="toggleBoard('${g.id}')">
        <td>${g.state==='STATUS_CUT'?'<span style="color:var(--red)">CUT</span>':g.pos}</td>
        <td><span class="pcell">${img(g)}${flag(g)}<span class="bn">${g.name}</span><span class="chev">&#9662;</span></span></td>
        <td class="num ${parCls((g.toPar&&g.toPar.value)||0)}">${toPar(g)}</td>
        <td class="num">${boardThru(g)}</td>
        <td>${chips}</td>
      </tr>${bOpen?('<tr class="detail-row"><td colspan="5">'+scoreDetail(g)+'</td></tr>'):''}`;
    }).join('');

  const ros=Object.keys(ROSTER).map(id=>FIELD[id]).sort((a,b)=>(b.dk?b.dk.pts:0)-(a.dk?a.dk.pts:0));
  if(!ros.length){
    document.getElementById('cmpBody').innerHTML =
      `<tr><td colspan="12" style="padding:34px;text-align:center;color:var(--muted);font-size:15px">Rosters lock Thursday. All 24 golfers appear here once picks are in.</td></tr>`;
    return;
  }
  const best=Math.max(1,...ros.map(g=>Math.abs(g.dk?g.dk.pts:0)));
  document.getElementById('cmpBody').innerHTML=ros.map((g,i)=>{
    const d=g.dk||{pts:0,birdies:0,eagles:0,bogeys:0,cut:false,left:0};
    const own=(ROSTER[g.id]||[]).map(x=>ENTRANTS[x].name).join(', ');
    return `<tr class="${d.cut?'cut':''}">
      <td class="num own">${i+1}</td>
      <td><span class="pcell">${img(g)}${flag(g)}${g.name}</span></td>
      <td class="own">${own}</td>
      <td class="num">${d.cut?'CUT':g.pos}</td>
      <td class="num ${parCls((g.toPar&&g.toPar.value)||0)}">${toPar(g)}</td>
      <td class="num">${thru(g)}</td>
      <td class="num">${d.cut?'&mdash;':d.left}</td>
      <td class="num">${d.birdies}</td>
      <td class="num">${d.eagles}</td>
      <td class="num">${d.bogeys}</td>
      <td class="num"><b>${fmt(d.pts)}</b></td>
      <td><span class="bar ${d.pts<0?'neg':''}"><i style="width:${Math.min(100,Math.abs(d.pts)/best*100)}%"></i></span></td>
    </tr>`;
  }).join('');
}

function banner(b){
  const el=document.getElementById('banner');
  if(!b){el.className='banner hide';return;}
  el.className='banner'+(b.err?' err':'');
  el.textContent=b.m;
}
function showTab(id){
  ['pool','board','cmp','pins'].forEach(t=>{
    document.getElementById(t).classList.toggle('hide',t!==id);
    document.getElementById('t-'+t).setAttribute('aria-selected',String(t===id));
  });
}
function toggleOwned(){
  ownedOnly=!ownedOnly;
  document.getElementById('ownedBtn').textContent=ownedOnly?'Show full field':'Owned golfers only';
  render();
}

/* ================= player round detail (inline) ================= */
const fmtPar=v=>v===0?'E':(v>0?'+'+v:''+v);
const pcl=v=>v<0?'under':(v>0?'over':'lvl');
function roundStats(rd){
  let pts=0,b=0,e=0,bg=0,streak=0,got=false,clean=true;
  rd.holes.forEach(h=>{
    pts+=holePts(h);
    const d=h.value-h.par;
    if(d===-1) b++;
    if(d<=-2) e++;
    if(d>=1){bg++;clean=false;}
    if(d<=-1){streak++; if(streak>=3&&!got){pts+=DK.STREAK;got=true;}} else streak=0;
  });
  const ss=rd.holes.reduce((s,h)=>s+h.value,0), ps=rd.holes.reduce((s,h)=>s+h.par,0);
  const complete=rd.holes.length===18;
  if(complete&&clean) pts+=DK.BOGEY_FREE;
  return {toPar:ss-ps, birdies:b, eagles:e, bogeys:bg, pts, complete, played:rd.holes.length};
}
function scoreCard(rd,label){
  if(!rd||!rd.holes||!rd.holes.length) return '';
  const played=rd.holes;
  const mk=h=>{const d=h.value-h.par;return d<=-2?'eagle':d===-1?'birdie':d===1?'bogey':d>=2?'dbl':'';};
  let run=0; const cum=played.map(h=>{run+=h.value-h.par;return run;});
  const st=roundStats(rd);
  const nine=(from,to,totLbl)=>{                       // always render all 9 holes; blank boxes for unplayed
    let hdr='',parRow='',sc='',tp='',parSum=0,scSum=0;
    for(let idx=from;idx<to;idx++){
      hdr+=`<th>${idx+1}</th>`;
      const h=played[idx];
      const p=h?h.par:(PARS[idx]||'');
      parRow+=`<td>${p}</td>`; if(typeof p==='number')parSum+=p;
      if(h){
        sc+=`<td><span class="mk ${mk(h)}">${h.value}</span></td>`;
        tp+=`<td class="tp ${pcl(cum[idx])}">${fmtPar(cum[idx])}</td>`;
        scSum+=h.value;
      } else { sc+=`<td></td>`; tp+=`<td></td>`; }
    }
    const done=!!played[to-1];                          // nine complete -> show its totals
    const scTot=done?scSum:'';
    const tpTot=done?`<span class="${pcl(cum[to-1])}">${fmtPar(cum[to-1])}</span>`:'';
    return `<table class="sc"><thead><tr><th class="lab"></th>${hdr}<th class="tot">${totLbl}</th></tr></thead>`+
      `<tbody><tr><td class="lab">Par</td>${parRow}<td class="tot">${parSum}</td></tr>`+
      `<tr><td class="lab">Score</td>${sc}<td class="tot">${scTot}</td></tr>`+
      `<tr><td class="lab">To Par</td>${tp}<td class="tot">${tpTot}</td></tr></tbody></table>`;
  };
  const bits=[`<b class="${pcl(st.toPar)}">${fmtPar(st.toPar)}</b> to par`,
    st.birdies?`${st.birdies} birdie${st.birdies>1?'s':''}`:null,
    st.eagles?`${st.eagles} eagle${st.eagles>1?'s':''}`:null,
    st.bogeys?`${st.bogeys} bogey${st.bogeys>1?'s':''}`:null,
    `<b>${fmt(st.pts)}</b> pts`].filter(Boolean).join(' &middot; ');
  return `<div class="rd-block"><div class="rd-ttl">${label}${st.complete?'':' &middot; thru '+st.played}</div>`+
    `<div class="rd-stats">${bits}</div>`+
    `<div class="sc-wrap">${nine(0,9,'Out')}${nine(9,18,'In')}</div></div>`;
}
function scoreDetail(g){
  const rounds=(g.holes||[]).map((rd,i)=>scoreCard(rd,'Round '+(i+1))).join('');
  let body;
  if(rounds) body=`<div class="legend"><span><i class="lg cir"></i>Birdie</span><span><i class="lg sq"></i>Bogey</span><span>double = eagle / dbl+</span></div>`+rounds;
  else if(g.teeTime && g.state==='STATUS_SCHEDULED'){
    const ms=new Date(g.teeTime).getTime();
    body=`<div class="sheet-tee"><div class="big">${new Date(ms).toLocaleTimeString('en-US',{timeZone:'Europe/London',hour:'numeric',minute:'2-digit'})} UK</div>`+
      `<div class="sm">${new Date(ms).toLocaleTimeString('en-US',{timeZone:'America/Chicago',hour:'numeric',minute:'2-digit'})} CT &middot; `+
      `${new Date(ms).toLocaleTimeString('en-US',{timeZone:'America/New_York',hour:'numeric',minute:'2-digit'})} ET</div>`+
      `<div class="sm" style="margin-top:9px">Round 1 tee time &middot; not started</div></div>`;
  } else body=`<div class="sheet-note">Hole-by-hole scores appear here once ${g.name.split(' ').pop()} tees off.</div>`;
  return `<div class="pdetail">${body}</div>`;
}
function ensureHoles(id){
  const g=FIELD[id];
  if(g && !g.holes && started(g) && !MOCK) loadHoles([id]).then(()=>{ score(g); render(); });
}
function toggleTeam(idx){ openTeams.has(idx)?openTeams.delete(idx):openTeams.add(idx); render(); }
function togglePool(teamIdx,pickIdx,id){
  const k='p:'+teamIdx+':'+pickIdx;
  if(expanded.has(k)) expanded.delete(k); else { expanded.add(k); ensureHoles(id); }
  render();
}
function toggleBoard(id){
  const k='b:'+id;
  if(expanded.has(k)) expanded.delete(k); else { expanded.add(k); ensureHoles(id); }
  render();
}

/* ================= weather (Royal Birkdale) ================= */
const WMO={0:'Clear',1:'Mainly clear',2:'Partly cloudy',3:'Overcast',45:'Fog',48:'Rime fog',
  51:'Light drizzle',53:'Drizzle',55:'Heavy drizzle',56:'Freezing drizzle',57:'Freezing drizzle',
  61:'Light rain',63:'Rain',65:'Heavy rain',66:'Freezing rain',67:'Freezing rain',
  71:'Light snow',73:'Snow',75:'Heavy snow',77:'Snow grains',
  80:'Rain showers',81:'Rain showers',82:'Heavy showers',85:'Snow showers',86:'Snow showers',
  95:'Thunderstorm',96:'Thunderstorm',99:'Thunderstorm'};
const compass=d=>['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'][Math.round(((d||0)%360)/22.5)%16];
async function loadWx(){
  try{
    const u='https://api.open-meteo.com/v1/forecast?latitude=53.6236&longitude=-3.0327'+
            '&current=temperature_2m,weather_code,wind_speed_10m,wind_direction_10m,wind_gusts_10m'+
            '&temperature_unit=fahrenheit&wind_speed_unit=mph&timezone=Europe%2FLondon';
    const r=await fetch(u,{cache:'no-store'}); if(!r.ok) throw new Error();
    const c=(await r.json()).current;
    document.getElementById('wxv').textContent=Math.round(c.temperature_2m)+'°F';
    const cond=WMO[c.weather_code]||'';
    document.getElementById('wxs').textContent=
      (cond?cond+' · ':'')+'Wind '+Math.round(c.wind_speed_10m)+' '+compass(c.wind_direction_10m)+
      (c.wind_gusts_10m?(' · G '+Math.round(c.wind_gusts_10m)):'');
  }catch(e){ document.getElementById('wxs').textContent='Weather unavailable'; }
}

load();
setInterval(load,REFRESH_MS);
loadWx();
setInterval(loadWx,600000);
</script>
